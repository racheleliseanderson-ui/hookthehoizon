<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc"><title id="title">Observable cue comparison for aquatic insects</title><desc id="desc">A simplified field diagram compares tails, cases, surface wings, and rock-crawling behavior without claiming species identification or current conditions.</desc><rect width="1200" height="600" rx="36" fill="#edf2ef"/><path d="M0 110c150-55 250 45 395 0s268-45 420 0 240 42 385-8V0H0z" fill="#bee0dc"/><path d="M0 430c165-48 310 38 470 0s260-65 420-16 220 54 310 24v162H0z" fill="#123f52"/><text x="70" y="82" fill="#123f52" font-family="Arial,sans-serif" font-size="22" font-weight="700" letter-spacing="3">OBSERVE FIRST. NAME LATER.</text><g font-family="Arial,sans-serif"><g transform="translate(60 160)"><rect width="240" height="290" rx="24" fill="#fffdf7"/><circle cx="120" cy="94" r="54" fill="#d2763c"/><path d="M92 88h56M102 108l-24 58M120 108v66M138 108l24 58" stroke="#092532" stroke-width="8" stroke-linecap="round"/><text x="120" y="202" text-anchor="middle" fill="#092532" font-size="22" font-weight="800">TAIL FILAMENTS</text><text x="120" y="238" text-anchor="middle" fill="#4a616b" font-size="16">Two, three, or unclear?</text><text x="120" y="266" text-anchor="middle" fill="#4a616b" font-size="15">Count alone is not enough.</text></g><g transform="translate(340 160)"><rect width="240" height="290" rx="24" fill="#fffdf7"/><ellipse cx="120" cy="100" rx="62" ry="34" fill="#66755c"/><path d="M72 100h96" stroke="#092532" stroke-width="8" stroke-linecap="round"/><text x="120" y="202" text-anchor="middle" fill="#092532" font-size="22" font-weight="800">CASE OR NO CASE</text><text x="120" y="238" text-anchor="middle" fill="#4a616b" font-size="16">Portable structure visible?</text><text x="120" y="266" text-anchor="middle" fill="#4a616b" font-size="15">Absence does not rule out.</text></g><g transform="translate(620 160)"><rect width="240" height="290" rx="24" fill="#fffdf7"/><path d="M120 72c-42-48-82-6-48 34 18 21 34 26 48 28M120 72c42-48 82-6 48 34-18 21-34 26-48 28" fill="#bee0dc" stroke="#123f52" stroke-width="6"/><path d="M120 68v92" stroke="#092532" stroke-width="8" stroke-linecap="round"/><text x="120" y="202" text-anchor="middle" fill="#092532" font-size="22" font-weight="800">WINGED AT SURFACE</text><text x="120" y="238" text-anchor="middle" fill="#4a616b" font-size="16">Stage and posture matter.</text><text x="120" y="266" text-anchor="middle" fill="#4a616b" font-size="15">Presence is not a hatch report.</text></g><g transform="translate(900 160)"><rect width="240" height="290" rx="24" fill="#fffdf7"/><path d="M52 132c38-44 96-45 136-8l-18 34H74z" fill="#66755c"/><circle cx="120" cy="100" r="24" fill="#d2763c"/><path d="M120 124l-40 36M120 124l40 36" stroke="#092532" stroke-width="7"/><text x="120" y="202" text-anchor="middle" fill="#092532" font-size="22" font-weight="800">ROCK OR DEBRIS</text><text x="120" y="238" text-anchor="middle" fill="#4a616b" font-size="16">Where was it moving?</text><text x="120" y="266" text-anchor="middle" fill="#4a616b" font-size="15">Broad habitat, not location.</text></g></g><text x="70" y="540" fill="#fffdf7" font-family="Arial,sans-serif" font-size="18">Use visible cues to narrow a reference set. Check current conditions, regulations, access, safety, and conservation guidance separately.</text></svg>
