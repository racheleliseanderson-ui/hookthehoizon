name: Hook Theme Release Guard

on:
  pull_request:
    paths:
      - 'wordpress-theme/**'
      - 'wordpress-plugin/hook-content/**'
      - 'scripts/build-wordpress-release.sh'
      - 'scripts/sync-wordpress-tokens.mjs'
      - 'README.md'
      - '.github/workflows/theme-release-guard.yml'
  push:
    branches: [main]
    paths:
      - 'wordpress-theme/**'
      - 'wordpress-plugin/hook-content/**'
      - 'scripts/build-wordpress-release.sh'
      - 'scripts/sync-wordpress-tokens.mjs'
      - '.github/workflows/theme-release-guard.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - name: Build exact release artifacts
        run: bash scripts/build-wordpress-release.sh
      - name: Verify release evidence
        run: |
          test -s dist/SHA256SUMS
          test -n "$(find dist -maxdepth 1 -name 'hook-the-horizon-*.zip' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name 'hook-the-horizon-content-*.zip' -print -quit)"
          test -s dist/hook-the-horizon/release-manifest.json
          grep -q '"publication": "Hook the Horizon"' dist/hook-the-horizon/release-manifest.json
          grep -q '"repository": "racheleliseanderson-ui/hookthehorizon"' dist/hook-the-horizon/release-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: hook-the-horizon-wordpress-release
          path: |
            dist/*.zip
            dist/SHA256SUMS
            dist/hook-the-horizon/release-manifest.json
          if-no-files-found: error
          retention-days: 30
