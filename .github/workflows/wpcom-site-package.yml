name: WordPress.com Site Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-site-package:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Build validated WordPress release
        run: bash scripts/build-wordpress-release.sh

      - name: Validate publication-specific route plugin
        run: find wordpress-plugin/honey-hole-condition-route -name '*.php' -print0 | xargs -0 -r -n1 php -l

      - name: Assemble WordPress.com payload
        run: |
          rm -rf wpcom
          mkdir -p wpcom/themes wpcom/plugins
          cp -R dist/hook-the-horizon wpcom/themes/hook-the-horizon
          cp -R dist/hook-the-horizon-content wpcom/plugins/hook-the-horizon-content
          cp -R wordpress-plugin/honey-hole-condition-route wpcom/plugins/honey-hole-condition-route

      - name: Verify mapped payload
        run: |
          test -s wpcom/themes/hook-the-horizon/style.css
          test -s wpcom/themes/hook-the-horizon/release-manifest.json
          test -s wpcom/plugins/hook-the-horizon-content/hook-content.php
          test -s wpcom/plugins/honey-hole-condition-route/honey-hole-condition-route.php

      - name: Upload WordPress.com deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: wpcom
          path: wpcom/
          if-no-files-found: error
          retention-days: 1
