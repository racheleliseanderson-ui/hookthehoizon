name: Next-generation rebuild validation

on:
  pull_request:
    paths:
      - 'next-generation/**'
      - 'applications/presentation-planner/**'
      - 'applications/hatch-match/**'
      - 'scripts/sync-hatch-match-preview.mjs'
      - '.github/workflows/next-generation-rebuild.yml'
  push:
    branches: [main]
    paths:
      - 'next-generation/**'
      - 'applications/presentation-planner/**'
      - 'applications/hatch-match/**'
      - 'scripts/sync-hatch-match-preview.mjs'
      - '.github/workflows/next-generation-rebuild.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - name: Synchronize Hatch Match maintained artifacts
        run: node scripts/sync-hatch-match-preview.mjs
      - name: Validate PHP and JavaScript
        run: |
          while IFS= read -r -d '' file; do php -l "$file" >/dev/null; done < <(find next-generation -type f -name '*.php' -print0)
          while IFS= read -r -d '' file; do node --check "$file"; done < <(find next-generation applications/presentation-planner applications/hatch-match -type f \( -name '*.js' -o -name '*.mjs' \) -print0)
      - name: Validate JSON and Hatch Match ownership boundaries
        run: |
          while IFS= read -r -d '' file; do python -m json.tool "$file" >/dev/null; done < <(find next-generation applications/hatch-match -type f -name '*.json' -print0)
          cmp applications/hatch-match/data/approved-preview-seed-records.json next-generation/plugins/hatch-match-preview/data/seed-records.json
          cmp applications/hatch-match/maintenance-policy.json next-generation/plugins/hatch-match-preview/data/maintenance-policy.json
          cmp applications/hatch-match/maintenance-log.json next-generation/plugins/hatch-match-preview/data/maintenance-log.json
          grep -q '"recordCount": 3' applications/hatch-match/data/approved-preview-seed-records.json
          grep -q '"sourceCount": 4' applications/hatch-match/data/approved-preview-seed-records.json
      - name: Build exact Hook release artifacts
        run: bash scripts/build-wordpress-release.sh
      - name: Verify Presentation Planner package identity
        run: |
          test -f applications/presentation-planner/application.yaml
          test -f applications/presentation-planner/preview/app.mjs
          grep -q 'HTH-PP-001' applications/presentation-planner/application.yaml
          grep -q 'HTH-SM-001' governance/applications/smart-mode-storage-consent-boundaries.v1.json
      - name: Build maintained Hatch Match preview package
        run: |
          mkdir -p dist
          rm -f dist/hatch-match-preview-0.1.1-preview.zip dist/hatch-match-preview-0.1.1-preview.sha256
          (cd next-generation/plugins && zip -qr ../../dist/hatch-match-preview-0.1.1-preview.zip hatch-match-preview)
          sha256sum dist/hatch-match-preview-0.1.1-preview.zip > dist/hatch-match-preview-0.1.1-preview.sha256
      - name: Required route and style coverage
        run: |
          grep -R -q 'presentation-planner-preview' next-generation
          grep -R -q 'hatch-match-preview' next-generation
          grep -R -q 'hth-application-embed' next-generation
          grep -R -q 'hth-hatch-shell' next-generation
      - name: Reader-facing content firewall
        run: |
          if grep -R -n -E 'Sample Page|Lorem ipsum|PLACEHOLDER' next-generation/theme next-generation/plugins; then
            echo 'Reader-facing placeholder content detected.' >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: hook-next-generation-release-source
          path: |
            dist
            applications/hatch-match/data/approved-preview-seed-records.json
            applications/hatch-match/maintenance-policy.json
            applications/hatch-match/maintenance-log.json
          if-no-files-found: error

  installed-preview:
    needs: source-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build exact package directories for wp-env
        run: |
          node scripts/sync-hatch-match-preview.mjs
          bash scripts/build-wordpress-release.sh
      - name: Install preview tooling
        run: npm install --no-save @wordpress/env playwright @axe-core/playwright
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Start isolated WordPress
        working-directory: next-generation/preview
        run: npx wp-env start
      - name: Activate exact packages and create controlled fixtures
        working-directory: next-generation/preview
        run: |
          mkdir -p ../../preview-evidence
          npx wp-env run cli wp theme list --status=active --field=name | head -n1 > ../../preview-evidence/previous-theme.txt
          npx wp-env run cli wp theme activate theme
          npx wp-env run cli wp plugin activate horizon-experience-core
          npx wp-env run cli wp plugin activate hook-the-horizon-content
          npx wp-env run cli wp plugin activate hatch-match-preview
          npx wp-env run cli wp post create --post_type=page --post_status=publish --post_title='Presentation Planner Preview' --post_name='presentation-planner-preview' --post_content='[hth_presentation_planner]'
          npx wp-env run cli wp post create --post_type=page --post_status=publish --post_title='Hatch Match Preview' --post_name='hatch-match-preview' --post_content='[hth_hatch_match]'
      - name: HTTP and stylesheet smoke checks
        run: |
          curl --fail http://localhost:8899/ >/dev/null
          curl --fail http://localhost:8899/presentation-planner-preview/ | grep -q 'hth-application-embed'
          curl --fail http://localhost:8899/hatch-match-preview/ | grep -q 'hth-hatch-shell'
      - name: Verify installed Presentation Planner and Smart Mode
        working-directory: next-generation/preview
        run: node ../../next-generation/preview/verify-presentation-planner.mjs
      - name: Verify installed Hatch Match
        working-directory: next-generation/preview
        run: node ../../next-generation/preview/verify-hatch-match.mjs
      - name: Record Hatch Match installed package readback
        working-directory: next-generation/preview
        run: |
          npx wp-env run cli wp eval 'echo wp_json_encode(hth_hatch_match_runtime_readback());' > ../../preview-evidence/hatch-match-runtime-readback.json
          python - <<'PY'
          import json
          data=json.load(open('../../preview-evidence/hatch-match-runtime-readback.json'))
          assert data['applicationId']=='HTH-HM-001'
          assert data['pluginVersion']=='0.1.1-preview'
          assert data['seedSchemaVersion']==3
          assert data['policySchemaVersion']==2
          assert data['policyStatus']=='active-maintenance-authority'
          assert data['recordCount']==3
          assert data['sourceCount']==4
          assert data['maintenanceEntryCount']>=2
          assert set(data['runtimeArtifacts'])=={'seed','maintenancePolicy','maintenanceLog'}
          PY
      - name: Capture installed application evidence
        run: |
          npx playwright screenshot --browser=chromium --viewport-size=1440,1000 http://localhost:8899/presentation-planner-preview/ preview-evidence/presentation-page-desktop.png
          npx playwright screenshot --browser=chromium --viewport-size=390,844 http://localhost:8899/presentation-planner-preview/ preview-evidence/presentation-page-mobile.png
          npx playwright screenshot --browser=chromium --viewport-size=1440,1000 http://localhost:8899/hatch-match-preview/ preview-evidence/hatch-page-desktop.png
          npx playwright screenshot --browser=chromium --viewport-size=390,844 http://localhost:8899/hatch-match-preview/ preview-evidence/hatch-page-mobile.png
      - name: Validate application accessibility, identity, privacy and performance
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { chromium } from 'playwright';
          import AxeBuilder from '@axe-core/playwright';
          const browser=await chromium.launch({headless:true});
          const context=await browser.newContext({viewport:{width:1440,height:1000}});
          const pages=['/presentation-planner-preview/','/hatch-match-preview/'];
          const report={scope:'changed application routes only; publication-wide route QA remains in its separate workflow',pages:[],failures:[]};
          for(const pathname of pages){
            const page=await context.newPage();
            await page.goto(`http://localhost:8899${pathname}`,{waitUntil:'networkidle'});
            const h1Count=await page.locator('h1').count();
            const mainCount=await page.locator('main').count();
            const missingAlt=await page.locator('img:not([alt])').count();
            const axe=await new AxeBuilder({page}).withTags(['wcag2a','wcag2aa','wcag21a','wcag21aa','wcag22aa']).analyze();
            const material=axe.violations.filter(v=>['critical','serious'].includes(v.impact));
            const navigation=await page.evaluate(()=>{const e=performance.getEntriesByType('navigation')[0];return e?{domContentLoaded:e.domContentLoadedEventEnd,load:e.loadEventEnd}:null;});
            if(h1Count<1)report.failures.push(`${pathname}: missing h1`);
            if(mainCount<1)report.failures.push(`${pathname}: missing main landmark`);
            if(missingAlt>0)report.failures.push(`${pathname}: ${missingAlt} images lack alt attributes`);
            if(material.length)report.failures.push(`${pathname}: serious/critical axe violations: ${material.map(v=>v.id).join(', ')}`);
            if(navigation?.load>8000)report.failures.push(`${pathname}: local preview load exceeded 8000ms (${navigation.load})`);
            await page.keyboard.press('Tab');
            const focused=await page.evaluate(()=>({tag:document.activeElement?.tagName,text:document.activeElement?.textContent?.trim()}));
            if(!focused.tag||focused.tag==='BODY')report.failures.push(`${pathname}: keyboard focus did not enter an interactive control`);
            report.pages.push({pathname,h1Count,mainCount,missingAlt,materialViolations:material.map(v=>v.id),navigation,firstFocus:focused});
            await page.close();
          }
          await browser.close();
          fs.writeFileSync('preview-evidence/quality-report.json',JSON.stringify(report,null,2));
          if(report.failures.length){console.error(report.failures.join('\n'));process.exit(1);}
          NODE
      - name: Exercise isolated rollback and reactivation
        if: always()
        working-directory: next-generation/preview
        run: |
          previous_theme="$(tr -d '\r\n' < ../../preview-evidence/previous-theme.txt)"
          npx wp-env run cli wp plugin deactivate hatch-match-preview
          npx wp-env run cli wp plugin deactivate hook-the-horizon-content
          npx wp-env run cli wp plugin deactivate horizon-experience-core
          npx wp-env run cli wp theme activate "$previous_theme"
          curl --fail http://localhost:8899/ >/dev/null
          npx wp-env run cli wp theme activate theme
          npx wp-env run cli wp plugin activate horizon-experience-core
          npx wp-env run cli wp plugin activate hook-the-horizon-content
          npx wp-env run cli wp plugin activate hatch-match-preview
          curl --fail http://localhost:8899/presentation-planner-preview/ | grep -q 'hth-application-embed'
          curl --fail http://localhost:8899/hatch-match-preview/ | grep -q 'hth-hatch-shell'
          printf 'rollback-theme=%s\nreactivation=passed\n' "$previous_theme" > ../../preview-evidence/rollback.txt
      - name: Record environment and installed state
        if: always()
        working-directory: next-generation/preview
        run: |
          npx wp-env run cli wp core version > ../../preview-evidence/wordpress-version.txt
          npx wp-env run cli php -v > ../../preview-evidence/php-version.txt
          npx wp-env run cli wp plugin list --format=json > ../../preview-evidence/plugins.json
          npx wp-env run cli wp theme list --format=json > ../../preview-evidence/themes.json
          git rev-parse HEAD > ../../preview-evidence/commit.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hook-installed-preview
          path: preview-evidence
          if-no-files-found: error
      - name: Stop isolated WordPress
        if: always()
        working-directory: next-generation/preview
        run: npx wp-env stop
