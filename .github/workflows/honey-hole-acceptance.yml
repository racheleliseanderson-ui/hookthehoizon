name: Honey Hole acceptance

on:
  push:
    paths:
      - 'applications/honey-hole-intelligence/**'
      - 'wordpress-plugin/honey-hole-condition-route/**'
      - '.github/workflows/honey-hole-acceptance.yml'
  pull_request:
    paths:
      - 'applications/honey-hole-intelligence/**'
      - 'wordpress-plugin/honey-hole-condition-route/**'
      - '.github/workflows/honey-hole-acceptance.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate destination data, privacy, expiry, duplicates, filters, and reader contract
        env:
          HHI_TEST_DATE: '2026-07-24'
        run: node applications/honey-hole-intelligence/tests/validate-public-destinations.mjs
      - name: Validate PHP syntax
        run: php -l wordpress-plugin/honey-hole-condition-route/honey-hole-condition-route.php
      - name: Verify packaged data semantic parity
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          const canonical = JSON.parse(readFileSync('applications/honey-hole-intelligence/data/public-destination-records.v0.2.json'));
          const packaged = JSON.parse(readFileSync('wordpress-plugin/honey-hole-condition-route/data/public-destination-records.v0.2.json'));
          const ids = value => value.destinations.map(item => item.id).sort().join(',');
          if (canonical.applicationId !== packaged.applicationId || canonical.schemaVersion !== packaged.schemaVersion || canonical.destinations.length !== packaged.destinations.length || ids(canonical) !== ids(packaged)) {
            throw new Error('Packaged data is not semantically aligned with canonical source');
          }
          NODE
      - name: Build deployable plugin archive
        run: |
          mkdir -p build
          cd wordpress-plugin
          zip -r ../build/honey-hole-condition-route-0.3.0.zip honey-hole-condition-route
      - uses: actions/upload-artifact@v4
        with:
          name: honey-hole-condition-route-0.3.0
          path: build/honey-hole-condition-route-0.3.0.zip
          if-no-files-found: error
