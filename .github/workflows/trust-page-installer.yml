name: Trust page installer
on:
  push:
    paths: ["docs/trust-pages/wordpress.json", "docs/trust-pages/release-evidence.json", "scripts/install-trust-pages.php", ".github/workflows/trust-page-installer.yml"]
  pull_request:
    paths: ["docs/trust-pages/wordpress.json", "docs/trust-pages/release-evidence.json", "scripts/install-trust-pages.php"]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: php -l scripts/install-trust-pages.php
      - run: php -r '$r=json_decode(file_get_contents("docs/trust-pages/wordpress.json"),true); if(!$r || empty($r["template_slug"]) || empty($r["backup_option"])) exit(1);'
      - run: php -r '$e=json_decode(file_get_contents("docs/trust-pages/release-evidence.json"),true); if(!$e || $e["all_applicable_gates_passed"] !== false) exit(1);'
