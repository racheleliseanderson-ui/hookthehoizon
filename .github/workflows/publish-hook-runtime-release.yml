name: Publish Hook runtime release

on:
  push:
    paths:
      - '.github/workflows/publish-hook-runtime-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out canonical source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build and validate WordPress packages
        run: bash scripts/build-wordpress-release.sh

      - name: Publish controlled deployment assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: hook-runtime-2026-07-18-audit1
        run: |
          set -euo pipefail
          notes=$(cat <<EOF
          Controlled Hook the Horizon runtime synchronization package.

          Source commit: ${GITHUB_SHA}
          Target site: https://hookthehorizon.blog
          Recovery control: managed WordPress backup plus package deactivation/replacement.
          Package checksums are included in SHA256SUMS.
          EOF
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/hook-the-horizon-*.zip dist/hook-the-horizon-content-*.zip dist/SHA256SUMS --clobber
          else
            gh release create "$RELEASE_TAG" dist/hook-the-horizon-*.zip dist/hook-the-horizon-content-*.zip dist/SHA256SUMS --target "$GITHUB_SHA" --title "Hook runtime synchronization — 2026-07-18" --notes "$notes"
          fi

# Controlled rerun marker: 2026-07-18T18:08Z
