name: Compatibility Builder runtime gate

on:
  pull_request:
    paths:
      - 'applications/system-compatibility/**'
      - 'wordpress-theme/**'
      - 'wordpress-plugin/hook-content/**'
      - 'scripts/sync-system-compatibility-runtime.mjs'
      - '.wp-env.json'
      - '.github/scripts/hook-browser-gate.mjs'
      - '.github/workflows/prototype-runtime-gate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disposable-wordpress:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Sync canonical application assets
        run: |
          node scripts/sync-presentation-planner-runtime.mjs
          node scripts/sync-system-compatibility-runtime.mjs
      - run: npm install --no-save @wordpress/env@latest
      - run: npx wp-env start
      - name: Activate governed packages and seed routes
        run: |
          set -euxo pipefail
          npx wp-env run cli wp rewrite structure '/%postname%/'
          npx wp-env run cli wp theme activate wordpress-theme
          npx wp-env run cli wp plugin activate hook-content
          npx wp-env run cli wp plugin activate honey-hole-condition-route
          npx wp-env run cli wp post create --post_type=page --post_title='Compatibility Builder' --post_name='compatibility-builder' --post_status=publish
          npx wp-env run cli wp post create --post_type=page --post_title='Compatibility Result' --post_name='compatibility-result' --post_status=publish
          npx wp-env run cli wp rewrite flush
      - name: Exercise lifecycle, route, privacy and rollback surfaces
        run: |
          set -euxo pipefail
          mkdir -p evidence/privacy evidence/checksums
          npx wp-env run cli wp theme status wordpress-theme | grep -qi active
          npx wp-env run cli wp plugin status hook-content | grep -qi active
          npx wp-env run cli wp plugin deactivate hook-content
          npx wp-env run cli wp plugin activate hook-content
          npx wp-env run cli wp theme activate twentytwentyfour
          npx wp-env run cli wp theme activate wordpress-theme
          urls=(
            'http://localhost:8888/'
            'http://localhost:8888/compatibility-builder/'
            'http://localhost:8888/compatibility-result/'
            'http://localhost:8888/wp-content/plugins/hook-content/assets/system-compatibility/preview/index.html'
            'http://localhost:8888/wp-content/plugins/hook-content/assets/system-compatibility/evaluate.mjs'
          )
          for url in "${urls[@]}"; do
            file="evidence/privacy/$(printf '%s' "$url" | sha256sum | cut -d' ' -f1).txt"
            curl --fail --retry 20 --retry-delay 3 "$url" -o "$file"
          done
          grep -Rqi 'HTH-SC-001\|Find the weak link\|Compatibility Builder' evidence/privacy
          if grep -RInE '([+-]?[0-9]{1,2}\.[0-9]{4,}[,;][[:space:]]*[+-]?[0-9]{1,3}\.[0-9]{4,}|"(latitude|longitude|exact_location|private_access)"[[:space:]]*:)' evidence/privacy; then
            echo 'Protected location material detected in public runtime output.' >&2
            exit 1
          fi
          find wordpress-theme wordpress-plugin/hook-content -type f -print0 | sort -z | xargs -0 sha256sum > evidence/checksums/package-files.sha256
          npx wp-env run cli bash -lc 'test ! -f wp-content/debug.log || ! grep -Ei "PHP (Fatal|Parse) error" wp-content/debug.log'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hook-compatibility-runtime-${{ github.sha }}
          path: evidence/
          if-no-files-found: error
      - if: always()
        run: npx wp-env stop

  browser-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: mkdir -p evidence/browser
      - run: npm install --no-save @wordpress/env@latest playwright@latest @axe-core/playwright@latest lighthouse@latest
      - run: npx playwright install --with-deps chromium
      - name: Sync and start governed runtime
        run: |
          node scripts/sync-presentation-planner-runtime.mjs
          node scripts/sync-system-compatibility-runtime.mjs
          npx wp-env start
          npx wp-env run cli wp rewrite structure '/%postname%/'
          npx wp-env run cli wp theme activate wordpress-theme
          npx wp-env run cli wp plugin activate hook-content
          npx wp-env run cli wp post create --post_type=page --post_title='Compatibility Builder' --post_name='compatibility-builder' --post_status=publish
          npx wp-env run cli wp post create --post_type=page --post_title='Compatibility Result' --post_name='compatibility-result' --post_status=publish
          npx wp-env run cli wp rewrite flush
      - name: Browser, application and accessibility evidence
        run: node .github/scripts/hook-browser-gate.mjs
      - name: Lighthouse evidence
        run: |
          npx lighthouse http://localhost:8888/compatibility-builder/ --chrome-flags='--headless --no-sandbox' --only-categories=performance,accessibility --output=json --output-path=evidence/browser/lighthouse.json --quiet
          node -e "const r=require('./evidence/browser/lighthouse.json'); if(r.categories.performance.score<0.70||r.categories.accessibility.score<0.90){console.error({performance:r.categories.performance.score,accessibility:r.categories.accessibility.score});process.exit(1)}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hook-compatibility-browser-${{ github.sha }}
          path: evidence/browser/
          if-no-files-found: error
      - if: always()
        run: npx wp-env stop
