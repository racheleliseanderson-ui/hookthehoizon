name: Prototype runtime gate

on:
  pull_request:
    paths:
      - 'wordpress-theme/**'
      - 'content-plugin/**'
      - 'wordpress-plugin/**'
      - '.wp-env.json'
      - '.github/workflows/prototype-runtime-gate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disposable-wordpress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-save @wordpress/env@latest
      - run: npx wp-env start
      - name: Runtime lifecycle, privacy, route, checksum and rollback evidence
        run: |
          set -euxo pipefail
          mkdir -p evidence/privacy evidence/checksums
          npx wp-env run cli wp theme activate wordpress-theme
          npx wp-env run cli wp plugin activate content-plugin
          npx wp-env run cli wp plugin activate honey-hole-condition-route
          npx wp-env run cli wp post create --post_type=page --post_title='Compatibility Builder' --post_name='compatibility-builder' --post_status=publish
          npx wp-env run cli wp post create --post_type=page --post_title='Compatibility Result' --post_name='compatibility-result' --post_status=publish
          npx wp-env run cli wp plugin deactivate content-plugin
          npx wp-env run cli wp plugin activate content-plugin
          npx wp-env run cli wp theme activate twentytwentyfour
          npx wp-env run cli wp theme activate wordpress-theme
          for url in http://localhost:8888/ http://localhost:8888/compatibility-builder/ http://localhost:8888/compatibility-result/ http://localhost:8888/wp-json/horizon-intelligence/v1/honey-hole-conditions; do
            curl --fail --retry 20 --retry-delay 3 "$url" -o "evidence/privacy/$(printf '%s' "$url" | sha256sum | cut -d' ' -f1).txt"
          done
          if grep -RInE '([+-]?[0-9]{1,2}\.[0-9]{4,}[,;][[:space:]]*[+-]?[0-9]{1,3}\.[0-9]{4,}|"(latitude|longitude|exact_location|private_access)"[[:space:]]*:)' evidence/privacy; then exit 1; fi
          find wordpress-theme content-plugin wordpress-plugin -type f -print0 | sort -z | xargs -0 sha256sum > evidence/checksums/package-files.sha256
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hook-runtime-evidence-${{ github.sha }}
          path: evidence/
          if-no-files-found: error
      - if: always()
        run: npx wp-env stop

  browser-matrix:
    needs: disposable-wordpress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: mkdir -p evidence/browser
      - run: npm install --no-save @wordpress/env@latest playwright@latest @axe-core/playwright@latest lighthouse@latest
      - run: npx playwright install --with-deps chromium
      - name: Start governed runtime
        run: |
          npx wp-env start
          npx wp-env run cli wp theme activate wordpress-theme
          npx wp-env run cli wp plugin activate content-plugin
          npx wp-env run cli wp plugin activate honey-hole-condition-route
          npx wp-env run cli wp post create --post_type=page --post_title='Compatibility Builder' --post_name='compatibility-builder' --post_status=publish
          npx wp-env run cli wp post create --post_type=page --post_title='Compatibility Result' --post_name='compatibility-result' --post_status=publish
      - name: Browser and accessibility evidence
        run: node .github/scripts/hook-browser-gate.mjs
      - name: Lighthouse evidence
        run: |
          npx lighthouse http://localhost:8888/compatibility-builder/ --chrome-flags='--headless --no-sandbox' --only-categories=performance,accessibility --output=json --output-path=evidence/browser/lighthouse.json --quiet
          node -e "const r=require('./evidence/browser/lighthouse.json'); if(r.categories.performance.score<0.70||r.categories.accessibility.score<0.90) process.exit(1)"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hook-browser-evidence-${{ github.sha }}
          path: evidence/browser/
          if-no-files-found: error
      - if: always()
        run: npx wp-env stop
