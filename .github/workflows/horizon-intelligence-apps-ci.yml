name: Horizon Intelligence Applications CI

on:
  pull_request:
    paths:
      - 'applications/**'
      - 'wordpress-theme/patterns/living-fly-bench-hub.php'
      - 'wordpress-theme/patterns/presentation-lab-hub.php'
      - 'docs/governance/AUTONOMOUS_APPLICATION_RELEASE_PROFILE.md'
      - 'docs/intelligence/HORIZON_SMART_MODE_IMPLEMENTATION.md'
      - '.github/workflows/horizon-intelligence-apps-ci.yml'
  push:
    branches: [main]
    paths:
      - 'applications/**'
      - 'wordpress-theme/patterns/living-fly-bench-hub.php'
      - 'wordpress-theme/patterns/presentation-lab-hub.php'
      - '.github/workflows/horizon-intelligence-apps-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changed-risk-surface:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - name: Run shared intelligence tests
        run: node applications/_shared/tests/run.mjs
      - name: Check browser and service-worker modules
        run: |
          node --check applications/presentation-planner/preview/app.mjs
          node --check applications/presentation-planner/preview/sw.js
      - name: Validate JSON contracts and manifest
        run: |
          node -e "for (const file of ['applications/_shared/contracts.v1.json','applications/rig-signal/device-event.v1.json','applications/presentation-planner/preview/manifest.webmanifest']) JSON.parse(require('node:fs').readFileSync(file, 'utf8')); console.log('JSON contracts valid')"
      - name: Validate WordPress pattern PHP
        run: |
          php -l wordpress-theme/patterns/living-fly-bench-hub.php
          php -l wordpress-theme/patterns/presentation-lab-hub.php
      - name: Verify privacy and autonomous-release authorities are present
        run: |
          grep -q 'No exact location' applications/presentation-planner/preview/index.html
          grep -q 'Tier 3' docs/governance/AUTONOMOUS_APPLICATION_RELEASE_PROFILE.md
          grep -q 'locationIncluded' applications/rig-signal/device-event.v1.json
