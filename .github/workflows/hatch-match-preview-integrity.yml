name: Hatch Match Preview Integrity
on:
  pull_request:
    paths:
      - 'applications/hatch-match/**'
      - 'next-generation/plugins/hatch-match-preview/**'
      - 'scripts/sync-hatch-match-preview.mjs'
      - '.github/workflows/hatch-match-preview-integrity.yml'
      - '.github/workflows/hatch-match-maintenance.yml'
  push:
    branches: ['main','rebuild/2026-07-clean-luxury-worlds','operations/hatch-match-maintenance-activation-2026-07-20']
    paths:
      - 'applications/hatch-match/**'
      - 'next-generation/plugins/hatch-match-preview/**'
      - 'scripts/sync-hatch-match-preview.mjs'
      - '.github/workflows/hatch-match-preview-integrity.yml'
      - '.github/workflows/hatch-match-maintenance.yml'
permissions: {contents: read}
jobs:
  source-runtime-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - name: Regenerate runtime copies from canonical Hatch Match records
        run: node scripts/sync-hatch-match-preview.mjs
      - name: Reject source-runtime drift
        run: |
          cmp applications/hatch-match/data/approved-preview-seed-records.json next-generation/plugins/hatch-match-preview/data/seed-records.json
          cmp applications/hatch-match/maintenance-policy.json next-generation/plugins/hatch-match-preview/data/maintenance-policy.json
          cmp applications/hatch-match/maintenance-log.json next-generation/plugins/hatch-match-preview/data/maintenance-log.json
          python -m json.tool next-generation/plugins/hatch-match-preview/data/runtime-manifest.json >/dev/null
      - name: Validate preview application ownership and maintenance
        run: |
          python -m json.tool applications/hatch-match/data/approved-preview-seed-records.json >/dev/null
          python -m json.tool applications/hatch-match/maintenance-policy.json >/dev/null
          python -m json.tool applications/hatch-match/maintenance-log.json >/dev/null
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const seed=JSON.parse(fs.readFileSync('applications/hatch-match/data/approved-preview-seed-records.json','utf8'));
          const policy=JSON.parse(fs.readFileSync('applications/hatch-match/maintenance-policy.json','utf8'));
          const log=JSON.parse(fs.readFileSync('applications/hatch-match/maintenance-log.json','utf8'));
          const manifest=JSON.parse(fs.readFileSync('next-generation/plugins/hatch-match-preview/data/runtime-manifest.json','utf8'));
          if(seed.applicationId!=='HTH-HM-001'||seed.publicationState!=='approved_preview'||seed.records.length<3)throw new Error('Canonical Hatch Match seed contract is incomplete.');
          if(seed.maintenanceState!=='active'||seed.secondaryOperationalOwner!=='Editorial Ecosystem Application Operations')throw new Error('Seed maintenance ownership is not active.');
          if(policy.applicationId!=='HTH-HM-001'||policy.policyId!=='HTH-HM-MAINT-001'||policy.status!=='active-maintenance-authority')throw new Error('Maintenance authority is incomplete.');
          if(policy.secondaryOperationalOwner?.state!=='active'||!policy.cadence?.workflow)throw new Error('Secondary ownership or schedule is missing.');
          if(log.applicationId!=='HTH-HM-001'||!Array.isArray(log.entries)||log.entries.length<1)throw new Error('Maintenance log is incomplete.');
          if(manifest.applicationId!=='HTH-HM-001'||!manifest.artifacts?.seed||!manifest.artifacts?.maintenancePolicy||!manifest.artifacts?.maintenanceLog)throw new Error('Runtime manifest does not bind all maintained artifacts.');
          const sourceIds=new Set(seed.sources.map(source=>source.id));
          for(const record of seed.records){for(const sourceId of record.sourceIds){if(!sourceIds.has(sourceId))throw new Error(`Unknown source ID: ${sourceId}`);}}
          const forbiddenKeys=/^(exactLocation|coordinates?|latitude|longitude|lat|lng|gps|accessCode|gateCode|currentConditions|regulations?)$/i;
          const walk=(value)=>{if(Array.isArray(value)){value.forEach(walk);return;}if(value&&typeof value==='object'){for(const [key,child] of Object.entries(value)){if(forbiddenKeys.test(key))throw new Error(`Forbidden owned field: ${key}`);walk(child);}}};
          walk(seed.records);
          NODE
