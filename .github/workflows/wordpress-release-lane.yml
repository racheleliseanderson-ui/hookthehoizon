name: WordPress Release Lane

on:
  pull_request:
    paths:
      - 'wordpress-theme/**'
      - 'wordpress-plugin/hook-content/**'
      - 'applications/system-compatibility/**'
      - 'scripts/build-wordpress-release.sh'
      - 'scripts/sync-wordpress-tokens.mjs'
      - 'scripts/sync-presentation-planner-runtime.mjs'
      - 'scripts/sync-system-compatibility-runtime.mjs'
      - 'deployment/wordpress.json'
      - 'deployment/PRODUCTION_BRANCH_CONTRACT.md'
      - '.github/workflows/wordpress-release-lane.yml'
  push:
    branches: [main]
    paths:
      - 'wordpress-theme/**'
      - 'wordpress-plugin/hook-content/**'
      - 'applications/system-compatibility/**'
      - 'scripts/build-wordpress-release.sh'
      - 'scripts/sync-wordpress-tokens.mjs'
      - 'scripts/sync-presentation-planner-runtime.mjs'
      - 'scripts/sync-system-compatibility-runtime.mjs'
      - 'deployment/wordpress.json'
      - 'deployment/PRODUCTION_BRANCH_CONTRACT.md'
      - '.github/workflows/wordpress-release-lane.yml'
  workflow_dispatch:
    inputs:
      promote_production_branch:
        description: Promote the validated payload to the deployment-only production branch
        required: true
        type: boolean
        default: false
      deploy_via_ssh:
        description: Install the validated theme and plugin through protected SSH/WP-CLI
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: hook-wordpress-release
  cancel-in-progress: false

env:
  THEME_SLUG: hook-the-horizon
  PLUGIN_SLUG: hook-the-horizon-content
  PLUGIN_PATH: wordpress-plugin/hook-content
  PLUGIN_MAIN: hook-content.php

jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - name: Build existing governed release packages
        shell: bash
        run: bash scripts/build-wordpress-release.sh
      - name: Build validated production payload
        shell: bash
        run: |
          set -euo pipefail
          rm -rf production-payload release-evidence release-zips
          mkdir -p \
            "production-payload/themes/$THEME_SLUG" \
            "production-payload/plugins/$PLUGIN_SLUG" \
            release-evidence release-zips

          cp -R wordpress-theme/. "production-payload/themes/$THEME_SLUG/"
          cp -R "$PLUGIN_PATH"/. "production-payload/plugins/$PLUGIN_SLUG/"
          cp dist/*.zip release-zips/

          find production-payload -type f -name '*.php' -print0 | xargs -0 -r -n1 php -l >/dev/null
          test -f "production-payload/themes/$THEME_SLUG/style.css"
          test -f "production-payload/plugins/$PLUGIN_SLUG/$PLUGIN_MAIN"
          grep -Eq '^Theme Name:[[:space:]]*.+' "production-payload/themes/$THEME_SLUG/style.css"
          grep -Eq '^Version:[[:space:]]*.+' "production-payload/themes/$THEME_SLUG/style.css"
          grep -Eq '^[[:space:]]*\*[[:space:]]*Plugin Name:[[:space:]]*.+' "production-payload/plugins/$PLUGIN_SLUG/$PLUGIN_MAIN"
          grep -Eq '^[[:space:]]*\*[[:space:]]*Version:[[:space:]]*.+' "production-payload/plugins/$PLUGIN_SLUG/$PLUGIN_MAIN"

          test "$(find production-payload -mindepth 1 -maxdepth 1 -printf '%f\n' | sort | paste -sd, -)" = 'plugins,themes'
          prohibited='(^|/)(\.git|\.github|deployment|docs?|tests?|fixtures?|governance|source-notes)(/|$)'
          if find production-payload -mindepth 1 -print | grep -E "$prohibited"; then
            echo 'Prohibited path found in production payload.' >&2
            exit 1
          fi

          theme_version="$(awk -F': ' '/^Version:/{print $2;exit}' "production-payload/themes/$THEME_SLUG/style.css" | tr -d '\r')"
          plugin_version="$(awk -F': ' '/^[[:space:]]*\*[[:space:]]*Version:/{print $2;exit}' "production-payload/plugins/$PLUGIN_SLUG/$PLUGIN_MAIN" | tr -d '\r')"
          test -n "$theme_version"
          test -n "$plugin_version"
          test -f "release-zips/$THEME_SLUG-$theme_version.zip"
          test -f "release-zips/$PLUGIN_SLUG-$plugin_version.zip"

          (cd production-payload && find . -type f -print0 | sort -z | xargs -0 sha256sum) > release-evidence/SHA256SUMS
          (cd release-zips && sha256sum ./*.zip) > release-evidence/ZIP-SHA256SUMS
          printf '{"schemaVersion":1,"repository":"%s","sourceCommit":"%s","publication":"Hook the Horizon","domain":"https://hookthehorizon.blog","theme":{"slug":"%s","version":"%s"},"plugin":{"slug":"%s","version":"%s"},"sharedPlugin":{"slug":"rachel-editorial-core","included":false,"note":"Managed as a separate governed component"},"validatedAt":"%s"}\n' \
            "$GITHUB_REPOSITORY" "$GITHUB_SHA" "$THEME_SLUG" "$theme_version" "$PLUGIN_SLUG" "$plugin_version" "$(date -u +%FT%TZ)" \
            > release-evidence/release-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: hook-wordpress-release-${{ github.sha }}
          path: |
            production-payload/**
            release-zips/*.zip
            release-evidence/**
          if-no-files-found: error
          retention-days: 90

  promote-production-branch:
    needs: validate-and-package
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.promote_production_branch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: hook-wordpress-release-${{ github.sha }}
          path: validated
      - name: Publish deployment-only production branch
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code origin refs/heads/production >/dev/null 2>&1; then
            old_sha="$(git ls-remote origin refs/heads/production | awk '{print $1}')"
            tag="production-rollback-$(date -u +%Y%m%dT%H%M%SZ)"
            git tag "$tag" "$old_sha"
            git push origin "refs/tags/$tag"
          fi
          tmp="$(mktemp -d)"
          cp -R validated/production-payload/. "$tmp/"
          git checkout --orphan production-build
          git rm -rf . >/dev/null 2>&1 || true
          cp -R "$tmp"/. .
          test "$(find . -mindepth 1 -maxdepth 1 ! -name .git -printf '%f\n' | sort | paste -sd, -)" = 'plugins,themes'
          git add themes plugins
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m "Promote ${GITHUB_SHA} to production wp-content mirror"
          git push --force origin HEAD:production

  deploy-via-ssh-wp-cli:
    needs: validate-and-package
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.deploy_via_ssh
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      WP_SSH_HOST: ${{ vars.WP_SSH_HOST }}
      WP_SSH_PORT: ${{ vars.WP_SSH_PORT }}
      WP_SSH_USER: ${{ vars.WP_SSH_USER }}
      WP_PATH: ${{ vars.WP_PATH }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hook-wordpress-release-${{ github.sha }}
          path: validated
      - name: Configure protected SSH identity
        shell: bash
        run: |
          set -euo pipefail
          test -n "$WP_SSH_HOST"
          test -n "$WP_SSH_PORT"
          test -n "$WP_SSH_USER"
          test -n "$WP_PATH"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' '${{ secrets.WP_SSH_PRIVATE_KEY }}' > ~/.ssh/id_ed25519
          printf '%s\n' '${{ secrets.WP_SSH_KNOWN_HOSTS }}' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Install exact packages with WP-CLI
        shell: bash
        run: |
          set -euo pipefail
          theme_zip="$(find validated/release-zips -maxdepth 1 -name "$THEME_SLUG-*.zip" -print -quit)"
          plugin_zip="$(find validated/release-zips -maxdepth 1 -name "$PLUGIN_SLUG-*.zip" -print -quit)"
          test -f "$theme_zip"
          test -f "$plugin_zip"
          scp -P "$WP_SSH_PORT" "$theme_zip" "$WP_SSH_USER@$WP_SSH_HOST:/tmp/$THEME_SLUG-release.zip"
          scp -P "$WP_SSH_PORT" "$plugin_zip" "$WP_SSH_USER@$WP_SSH_HOST:/tmp/$PLUGIN_SLUG-release.zip"
          ssh -p "$WP_SSH_PORT" "$WP_SSH_USER@$WP_SSH_HOST" \
            "WP_PATH='$WP_PATH' THEME_SLUG='$THEME_SLUG' PLUGIN_SLUG='$PLUGIN_SLUG' bash -s" <<'REMOTE'
          set -euo pipefail
          theme_was_active=false
          plugin_was_active=false
          wp --path="$WP_PATH" theme is-active "$THEME_SLUG" && theme_was_active=true || true
          wp --path="$WP_PATH" plugin is-active "$PLUGIN_SLUG" && plugin_was_active=true || true
          wp --path="$WP_PATH" theme install "/tmp/$THEME_SLUG-release.zip" --force
          wp --path="$WP_PATH" plugin install "/tmp/$PLUGIN_SLUG-release.zip" --force
          if [ "$theme_was_active" = true ]; then wp --path="$WP_PATH" theme activate "$THEME_SLUG"; fi
          if [ "$plugin_was_active" = true ]; then wp --path="$WP_PATH" plugin activate "$PLUGIN_SLUG"; fi
          wp --path="$WP_PATH" cache flush || true
          rm -f "/tmp/$THEME_SLUG-release.zip" "/tmp/$PLUGIN_SLUG-release.zip"
          REMOTE
