name: Compatibility Builder package validation

on:
  push:
    branches: [rebuild/compatibility-builder-package-candidate]
  pull_request:
    paths:
      - 'applications/system-compatibility/**'
      - 'wordpress-theme/**'
      - 'wordpress-plugin/hook-content/**'
      - 'scripts/**'
      - '.github/workflows/prototype-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y php-cli jq zip
      - name: Deterministic compatibility fixtures
        run: node applications/system-compatibility/tests/run.mjs
      - name: Validate JavaScript sources
        run: |
          node --check applications/system-compatibility/evaluate.mjs
          node --check applications/system-compatibility/preview/app.mjs
          node --check scripts/sync-system-compatibility-runtime.mjs
          node --check .github/scripts/hook-browser-gate.mjs
      - name: Validate PHP and JSON
        run: |
          find wordpress-theme wordpress-plugin/hook-content -type f -name '*.php' -print0 | xargs -0 -n1 php -l
          find wordpress-theme wordpress-plugin/hook-content applications/system-compatibility -type f -name '*.json' -print0 | xargs -0 -n1 jq empty
      - name: Validate block markup balance
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re,sys
          files=list(Path('wordpress-theme/templates').glob('*.html'))+list(Path('wordpress-theme/parts').glob('*.html'))+list(Path('wordpress-theme/patterns').glob('*.php'))
          bad=[]
          for path in files:
              source=path.read_text(errors='ignore')
              opens=len(re.findall(r'<!--\s+wp:[^/][^>]*-->',source))
              closes=len(re.findall(r'<!--\s+/wp:',source))
              selfs=len(re.findall(r'<!--\s+wp:[^>]+/-->',source))
              if opens-selfs!=closes: bad.append((str(path),opens,selfs,closes))
          if bad:
              print('Unbalanced block comments:',bad);sys.exit(1)
          print(f'Block comment balance passed for {len(files)} files')
          PY
      - name: Protected-location static leak scan
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re,sys
          roots=[Path('applications/system-compatibility'),Path('wordpress-theme'),Path('wordpress-plugin/hook-content')]
          suffixes={'.php','.js','.mjs','.json','.html','.css','.svg'}
          pair=re.compile(r'(?<![\d.])[+-]?\d{1,2}\.\d{4,}\s*[,;]\s*[+-]?\d{1,3}\.\d{4,}(?![\d.])')
          assignment=re.compile(r'(?i)(latitude|longitude|\blat\b|\blng\b)\s*["\']?\s*[:=]\s*["\']?[+-]?\d{1,3}\.\d{4,}')
          findings=[]
          for root in roots:
              for path in root.rglob('*'):
                  if path.is_file() and path.suffix.lower() in suffixes:
                      for n,line in enumerate(path.read_text(errors='ignore').splitlines(),1):
                          if pair.search(line) or assignment.search(line): findings.append((str(path),n,line.strip()[:240]))
          if findings:
              print('Potential literal coordinate data found:',findings);sys.exit(1)
          print('No likely literal coordinate values found.')
          PY
      - name: Build versioned WordPress artifacts
        run: bash scripts/build-wordpress-release.sh
      - name: Create package manifest
        run: |
          printf '{"publication":"Hook the Horizon","applicationId":"HTH-SC-001","status":"package-candidate","branch":"rebuild/compatibility-builder-package-candidate","commit":"%s"}\n' "$GITHUB_SHA" > dist/compatibility-package-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: hook-compatibility-package-${{ github.sha }}
          path: |
            dist/*.zip
            dist/SHA256SUMS
            dist/compatibility-package-manifest.json
          if-no-files-found: error
