name: Prototype validation and staging package

on:
  push:
    branches: [rebuild/prototype-review]
  pull_request:
    paths:
      - 'wordpress-theme/**'
      - 'content-plugin/**'
      - '.github/workflows/prototype-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  THEME_DIR: wordpress-theme
  CONTENT_PLUGIN_DIR: content-plugin

jobs:
  validate-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify prototype package roots
        run: |
          test -d "$THEME_DIR"
          test -f "$THEME_DIR/style.css"
          test -d "$CONTENT_PLUGIN_DIR"
          if [ -d theme ]; then
            echo "::warning::A second theme root exists at theme/. This workflow packages wordpress-theme/ because that is the prototype source changed by this pull request. Canonical source selection remains a review gate."
          fi
      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y php-cli jq zip
      - name: Validate PHP
        run: find "$THEME_DIR" "$CONTENT_PLUGIN_DIR" -type f -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Validate JSON
        run: find "$THEME_DIR" "$CONTENT_PLUGIN_DIR" -type f -name '*.json' -print0 | xargs -0 -n1 jq empty
      - name: Validate block markup balance
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re
          import sys

          theme = Path(os.environ['THEME_DIR'])
          files = (
              list((theme / 'templates').glob('*.html'))
              + list((theme / 'parts').glob('*.html'))
              + list((theme / 'patterns').glob('*.php'))
          )
          bad = []
          for path in files:
              source = path.read_text(errors='ignore')
              opens = len(re.findall(r'<!--\s+wp:[^/][^>]*-->', source))
              closes = len(re.findall(r'<!--\s+/wp:', source))
              self_closing = len(re.findall(r'<!--\s+wp:[^>]+/-->', source))
              if opens - self_closing != closes:
                  bad.append((str(path), opens, self_closing, closes))
          if bad:
              print('Unbalanced block comments:', bad)
              sys.exit(1)
          print(f'Block comment balance passed for {len(files)} files')
          PY
      - name: Protected-location static leak scan
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re
          import sys

          roots = [Path(os.environ['THEME_DIR']), Path(os.environ['CONTENT_PLUGIN_DIR'])]
          suffixes = {'.php', '.js', '.mjs', '.json', '.html', '.css', '.svg'}
          coordinate_pair = re.compile(
              r'(?<![\d.])[+-]?\d{1,2}\.\d{4,}\s*[,;]\s*[+-]?\d{1,3}\.\d{4,}(?![\d.])'
          )
          coordinate_assignment = re.compile(
              r'(?i)(latitude|longitude|\blat\b|\blng\b)\s*["\']?\s*[:=]\s*["\']?[+-]?\d{1,3}\.\d{4,}'
          )
          findings = []
          reviewed = 0
          for root in roots:
              for path in root.rglob('*'):
                  if not path.is_file() or path.suffix.lower() not in suffixes:
                      continue
                  reviewed += 1
                  source = path.read_text(errors='ignore')
                  for line_number, line in enumerate(source.splitlines(), start=1):
                      if coordinate_pair.search(line) or coordinate_assignment.search(line):
                          findings.append((str(path), line_number, line.strip()[:240]))
          if findings:
              print('Potential literal coordinate data found:')
              for finding in findings:
                  print(f'{finding[0]}:{finding[1]}: {finding[2]}')
              sys.exit(1)
          print(f'No likely literal coordinate values found in {reviewed} reviewed files.')
          PY
      - name: Report protected-location control terminology
        run: |
          grep -RInE '(exact[_ -]?location|private[_ -]?access|gps|latitude|longitude)' "$THEME_DIR" "$CONTENT_PLUGIN_DIR" --exclude='*.md' --exclude='*.txt' || true
          echo 'Terminology matches are informational. Defensive validation and prohibition language are permitted; literal sensitive values are not.'
      - name: Build staging ZIPs and checksums
        run: |
          rm -rf dist && mkdir -p dist/hook-the-horizon dist/hook-content
          cp -R "$THEME_DIR"/. dist/hook-the-horizon/
          cp -R "$CONTENT_PLUGIN_DIR"/. dist/hook-content/
          printf 'STAGING ONLY - NOT APPROVED FOR PRODUCTION\n' > dist/hook-the-horizon/STAGING-ONLY.txt
          printf 'STAGING ONLY - NOT APPROVED FOR PRODUCTION\n' > dist/hook-content/STAGING-ONLY.txt
          cd dist
          zip -qr hook-the-horizon-prototype.zip hook-the-horizon
          zip -qr hook-content-prototype.zip hook-content
          sha256sum *.zip > SHA256SUMS.txt
          printf '{"publication":"Hook the Horizon","status":"staging-only","branch":"rebuild/prototype-review","theme_source":"wordpress-theme","commit":"%s"}\n' "$GITHUB_SHA" > manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: hook-the-horizon-prototype-review
          path: |
            dist/*.zip
            dist/SHA256SUMS.txt
            dist/manifest.json
          if-no-files-found: error
