name: Prototype validation and staging package

on:
  push:
    branches: [rebuild/prototype-review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y php-cli jq zip
      - name: Validate PHP
        run: find theme content-plugin -type f -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Validate JSON
        run: find theme content-plugin -type f -name '*.json' -print0 | xargs -0 -n1 jq empty
      - name: Validate block markup balance
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re, sys
          bad=[]
          for p in list(Path('theme/templates').glob('*.html'))+list(Path('theme/parts').glob('*.html'))+list(Path('theme/patterns').glob('*.php')):
              s=p.read_text(errors='ignore')
              opens=len(re.findall(r'<!--\s+wp:[^/][^>]*-->',s))
              closes=len(re.findall(r'<!--\s+/wp:',s))
              selfs=len(re.findall(r'<!--\s+wp:[^>]+/-->',s))
              if opens-selfs != closes: bad.append((str(p),opens,selfs,closes))
          if bad:
              print('Unbalanced block comments:',bad)
              sys.exit(1)
          print('Block comment balance passed')
          PY
      - name: Protected-location static leak scan
        run: |
          ! grep -RInE '(exact[_ -]?location|private[_ -]?access|gps|latitude|longitude)' theme content-plugin --exclude='*.md' --exclude='*.txt' || {
            echo 'Potential protected-location identifier found; review required.'
            exit 1
          }
      - name: Build staging ZIPs and checksums
        run: |
          rm -rf dist && mkdir -p dist/hook-the-horizon dist/hook-content
          cp -R theme/. dist/hook-the-horizon/
          cp -R content-plugin/. dist/hook-content/
          printf 'STAGING ONLY - NOT APPROVED FOR PRODUCTION\n' > dist/hook-the-horizon/STAGING-ONLY.txt
          printf 'STAGING ONLY - NOT APPROVED FOR PRODUCTION\n' > dist/hook-content/STAGING-ONLY.txt
          cd dist
          zip -qr hook-the-horizon-prototype.zip hook-the-horizon
          zip -qr hook-content-prototype.zip hook-content
          sha256sum *.zip > SHA256SUMS.txt
          printf '{"publication":"Hook the Horizon","status":"staging-only","branch":"rebuild/prototype-review"}\n' > manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: hook-the-horizon-prototype-review
          path: |
            dist/*.zip
            dist/SHA256SUMS.txt
            dist/manifest.json
          if-no-files-found: error
