name: Application design authority

on:
  pull_request:
    paths:
      - 'next-generation/**'
      - '.github/workflows/**'
  push:
    branches:
      - 'rebuild/2026-07-clean-luxury-worlds'
    paths:
      - 'next-generation/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate design authority and evidence coverage
        run: |
          python - <<'PY'
          from pathlib import Path
          design = Path('next-generation/DESIGN.md')
          if not design.is_file():
              raise SystemExit('Missing next-generation/DESIGN.md')
          text = design.read_text(encoding='utf-8')
          required = ['Purpose and audience','Publication-specific visual direction','Typography','Color and surfaces','Layout, spacing, and geometry','Component anatomy','Application states','Responsive behavior','Accessibility','Hatch Match maintenance authority','Data, privacy, consent, permissions, and security','Performance and monitoring','Production data and migration','Prohibited patterns','Rendered acceptance examples','Current evidence and residual work']
          missing = [heading for heading in required if heading.casefold() not in text.casefold()]
          if missing:
              raise SystemExit('DESIGN.md missing sections: ' + ', '.join(missing))
          workflows = '\n'.join(path.read_text(encoding='utf-8', errors='ignore') for path in Path('.github/workflows').glob('*.y*ml')).casefold()
          evidence_terms = ['playwright','axe','mobile','reduced','forced','print','upload-artifact']
          absent = [term for term in evidence_terms if term not in workflows]
          if absent:
              raise SystemExit('Rendered-evidence workflow coverage missing: ' + ', '.join(absent))
          if 'Hook the Horizon' not in text:
              raise SystemExit('Publication identity missing from DESIGN.md')
          print('Application design authority and evidence contract validated.')
          PY
