<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc"><title id="title">Water-column presentation decision map</title><desc id="desc">A field diagram connects surface, middle, and bottom water zones with observation, presentation choice, and next-test notes.</desc><defs><linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#bfe1df"/><stop offset=".45" stop-color="#2c7180"/><stop offset="1" stop-color="#092532"/></linearGradient><filter id="shadow"><feDropShadow dy="14" stdDeviation="18" flood-opacity=".25"/></filter></defs><rect width="1440" height="720" rx="42" fill="#fffdf7"/><rect x="52" y="52" width="1336" height="616" rx="34" fill="url(#water)"/><path d="M52 230c170-40 310 45 475 0s310-45 470 0 275 32 391-8V52H52z" fill="#d9eeea" opacity=".85"/><path d="M52 512c180-35 330 28 500 6s310-82 485-42 242 66 351 35v157H52z" fill="#0b3442" opacity=".88"/><g font-family="Arial,sans-serif" fill="#fff"><text x="104" y="110" font-size="25" font-weight="700" letter-spacing="4">READ THE WATER BEFORE YOU RANK THE BOX</text><text x="104" y="170" font-family="Georgia,serif" font-size="54" font-weight="700">Observation → presentation → test</text></g><g filter="url(#shadow)" font-family="Arial,sans-serif"><g transform="translate(118 250)"><rect width="350" height="220" rx="24" fill="#fffdf7"/><text x="30" y="48" font-size="18" fill="#d2763c" font-weight="800">SURFACE / FILM</text><text x="30" y="84" font-size="24" fill="#092532" font-weight="800">What changed up top?</text><text x="30" y="122" font-size="17" fill="#244a5a">Light, wind, visible activity,</text><text x="30" y="150" font-size="17" fill="#244a5a">cover and line control.</text><path d="M30 180h290" stroke="#d2763c" stroke-width="4"/><text x="30" y="208" font-size="15" fill="#66755c">Choose one observable test.</text></g><g transform="translate(545 300)"><rect width="350" height="220" rx="24" fill="#fffdf7"/><text x="30" y="48" font-size="18" fill="#d2763c" font-weight="800">MID-DEPTH</text><text x="30" y="84" font-size="24" fill="#092532" font-weight="800">Hold, move, or pulse?</text><text x="30" y="122" font-size="17" fill="#244a5a">Depth band, speed, angle,</text><text x="30" y="150" font-size="17" fill="#244a5a">profile and contact.</text><path d="M30 180h290" stroke="#d2763c" stroke-width="4"/><text x="30" y="208" font-size="15" fill="#66755c">Change one variable at a time.</text></g><g transform="translate(972 360)"><rect width="350" height="220" rx="24" fill="#fffdf7"/><text x="30" y="48" font-size="18" fill="#d2763c" font-weight="800">BOTTOM / STRUCTURE</text><text x="30" y="84" font-size="24" fill="#092532" font-weight="800">Contact without fantasy.</text><text x="30" y="122" font-size="17" fill="#244a5a">Bottom type, obstruction,</text><text x="30" y="150" font-size="17" fill="#244a5a">snag risk and recovery.</text><path d="M30 180h290" stroke="#d2763c" stroke-width="4"/><text x="30" y="208" font-size="15" fill="#66755c">Record inconclusive outcomes.</text></g></g></svg>
