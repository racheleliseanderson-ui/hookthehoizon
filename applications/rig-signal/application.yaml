schema_version: 1.0.0
application:
  id: HTH-RS-001
  key: rig-signal
  public_name: Rig Signal
  parent_publication: Hook the Horizon
  class: device-evidence-and-import-application
  lifecycle: source-foundation
  repository: racheleliseanderson-ui/hookthehorizon
  path: applications/rig-signal
  owner: Rachel Anderson
reader_contract:
  primary_job: Normalize manual or device-originated events while keeping device identity, maturity, documented capability, calibration, uncertainty, privacy, and recommendation eligibility separate.
  result_contract: A validated or rejected event record with explicit quality, calibration, evidence, privacy, limitations, and next action.
  out_of_scope:
    - catch prediction
    - species identification without independently validated evidence
    - bite or fight classification from unsupported signals
    - environmental truth
    - exact location collection
architecture:
  event_contract: applications/rig-signal/device-event.v1.json
  validator: applications/rig-signal/validate.mjs
  fixtures: applications/rig-signal/fixtures/device-events.v1.json
  manual_baseline: required
  adapter_status: no-manufacturer-adapters
state:
  persistence_class: none-by-default
  location_included: false
  prohibited_fields:
    - coordinates
    - exact waterbody
    - private access instructions
    - catch outcome claims
capabilities:
  required:
    - manual-event-baseline
    - schema-validation
    - maturity-and-capability-separation
    - calibration-and-uncertainty-state
    - privacy-rejection
    - unsupported-claim-stop
    - export-safe-normalized-event
quality:
  accessibility_target: WCAG-2.2-AA
  end_to_end_paths:
    - documented-manual-event
    - estimated-prototype-event
    - stale-calibration
    - prohibited-privacy-class
    - unsupported-catch-prediction
release:
  current_version: 0.1.0-source
  production_authorized: false
  known_limitations:
    - no manufacturer adapter or device credential is configured
    - no WordPress reader interface is installed
    - manual logging remains the complete baseline
