schema_version: 1.1.0
application:
  id: HTH-HM-001
  key: hatch-match
  public_name: Hatch Match
  parent_publication: Hook the Horizon
  class: biological-evidence-application
  lifecycle: installed-preview-under-p1-acceptance
  repository: racheleliseanderson-ui/hookthehorizon
  path: applications/hatch-match
  owner: Rachel Anderson
reader_contract:
  primary_job: Compare broad-region biological plausibility with observable cues, disconfirming evidence, pattern and material records, and current condition references without claiming a verified current hatch from a calendar alone.
  result_contract: A bounded candidate set with life stage, observable cues, lookalikes, negative evidence, source date, freshness, limitations, and explicit no-match or insufficient-evidence states.
  out_of_scope:
    - exact or sensitive fishing locations
    - catch prediction
    - universal occurrence claims
    - regional calendar treated as current observation
    - regulation or access determination
architecture:
  biological_standard: applications/hatch-match/BIOLOGICAL_SEED_AND_REVIEW_STANDARD.md
  maintenance_authority: applications/hatch-match/maintenance-policy.json
  historical_maintenance_branch: operations/hatch-match-maintenance-activation-2026-07-20
  wordpress_package_source: next-generation/plugins/hatch-match-preview
  parent_conditions: HHI-001
  presentation_consumer: HTH-PP-001
state:
  persistence_class: local-or-none
  prohibited_fields:
    - coordinates
    - private access instructions
    - vulnerable-water identifiers
    - contributor identity without consent
quality:
  accessibility_target: WCAG-2.2-AA
  required_states:
    - no-observation
    - candidate-match
    - ambiguous-match
    - disconfirmed
    - stale-source
    - conservation-stop
    - source-failure
release:
  application_version: 0.1.1-preview
  production_authorized: false
  runtime_readback:
    captured_at: 2026-07-22
    site: https://hookthehorizon.blog
    wordpress_version: 7.0.2
    php_version: 8.4.23
    active_theme:
      stylesheet: hook-the-horizon-canonical-parity
      version: 0.3.0-remediation
    installed_plugin:
      name: Hook the Horizon Hatch Match Preview
      version: 0.1.1-preview
      active: true
    hosting_content_plugin:
      name: Hook the Horizon Content
      version: 0.3.1
      active: true
  known_limitations:
    - exact source-to-built-package-to-installed-file digest parity remains pending
    - installed-browser responsive and assistive-technology acceptance remains pending
    - stale-source and source-failure behavior must be exercised against current official-source fixtures
    - production activation remains separately governed
