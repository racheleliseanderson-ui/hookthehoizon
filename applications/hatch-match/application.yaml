schema_version: 1.1.0
application:
  id: HTH-HM-001
  key: hatch-match
  public_name: Hatch Match
  parent_publication: Hook the Horizon
  class: biological-evidence-application
  lifecycle: verified-live-bridge-canonical-package-candidate
  repository: racheleliseanderson-ui/hookthehorizon
  path: applications/hatch-match
  owner: Rachel Anderson
reader_contract:
  primary_job: Compare broad-region biological plausibility with observable cues, disconfirming evidence, pattern and material records, and current condition references without claiming a verified current hatch from a calendar alone.
  result_contract: A bounded candidate set with life stage, observable cues, lookalikes, negative evidence, source date, freshness, limitations, and explicit no-match or insufficient-evidence states.
  out_of_scope:
    - exact or sensitive fishing locations
    - catch prediction
    - universal occurrence claims
    - regional calendar treated as current observation
    - regulation or access determination
architecture:
  biological_standard: applications/hatch-match/BIOLOGICAL_SEED_AND_REVIEW_STANDARD.md
  maintenance_branch: main
  parent_conditions: HHI-001
  presentation_consumer: HTH-PP-001
  shortcode: hth_hatch_match
  canonical_package: next-generation/plugins/hatch-match-preview
  readiness_rest_contract: horizon-preview/v1/hatch-match-readiness
runtime:
  route: /hatch-match/
  delivery: verified-live-wordpress-page-bridge
  canonical_package_installed: false
  bridge_replacement_issue: 92
state:
  persistence_class: local-or-none
  prohibited_fields:
    - coordinates
    - private access instructions
    - vulnerable-water identifiers
    - contributor identity without consent
quality:
  accessibility_target: WCAG-2.2-AA
  required_states:
    - no-observation
    - candidate-match
    - ambiguous-match
    - disconfirmed
    - stale-source
    - conservation-stop
    - source-failure
release:
  current_version: 0.1.1-preview
  source_status: canonical-package-candidate
  live_status: verified-reversible-bridge
  production_authorized: false
  known_limitations:
    - canonical Hatch Match package installation and checksum readback remain open under issue 92
    - the live bridge must remain until package parity, privacy, export, keyboard, and route checks pass
