<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">First-cast hypothesis sequence</title>
  <desc id="desc">An explanatory diagram showing a safe casting position, a cast angle toward a current seam, an intended presentation lane, and an observation point used to decide whether to repeat, adjust, or move. It does not represent a real location.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#173d48"/>
    </marker>
    <pattern id="safe" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#f7f4ed"/>
      <circle cx="8" cy="8" r="3" fill="#173d48"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#f7f4ed"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#17242a">Make the first cast test one visible idea</text>
  <text x="60" y="110" font-family="Arial, sans-serif" font-size="21" fill="#35474f">Position + current path + presentation job + observation</text>

  <rect x="65" y="155" width="1070" height="420" rx="28" fill="#dcecf0" stroke="#17242a" stroke-width="4"/>
  <path d="M90 275 C310 215 520 255 710 225 C860 200 980 220 1110 185" fill="none" stroke="#173d48" stroke-width="52" opacity="0.9" marker-end="url(#arrow)"/>
  <path d="M120 425 C325 380 510 430 705 390 C860 358 985 368 1100 335" fill="none" stroke="#6e98a2" stroke-width="25" stroke-dasharray="22 16" marker-end="url(#arrow)"/>
  <path d="M250 318 C390 345 520 355 665 330 C790 308 900 300 1015 285" fill="none" stroke="#ffffff" stroke-width="10" stroke-dasharray="18 13"/>

  <rect x="92" y="455" width="220" height="88" rx="16" fill="url(#safe)" stroke="#17242a" stroke-width="4"/>
  <text x="202" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#17242a">SAFE POSITION</text>
  <text x="202" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#17242a">stable footing + exit route</text>

  <path d="M270 465 Q430 255 630 320" fill="none" stroke="#8a4f2d" stroke-width="7" marker-end="url(#arrow)"/>
  <text x="370" y="285" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#8a4f2d">Cast angle</text>

  <path d="M630 320 C720 300 810 305 910 292" fill="none" stroke="#17242a" stroke-width="13" stroke-dasharray="28 13" marker-end="url(#arrow)"/>
  <text x="690" y="355" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#17242a">Intended lane</text>
  <text x="690" y="383" font-family="Arial, sans-serif" font-size="18" fill="#35474f">named depth, speed, angle, and profile</text>

  <circle cx="920" cy="290" r="24" fill="#f7f4ed" stroke="#17242a" stroke-width="6"/>
  <circle cx="920" cy="290" r="8" fill="#17242a"/>
  <text x="850" y="245" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#17242a">Observation point</text>
  <text x="850" y="420" font-family="Arial, sans-serif" font-size="18" fill="#35474f">Did the presentation reach the lane, hold depth, and move as expected?</text>

  <g font-family="Arial, sans-serif" fill="#17242a">
    <rect x="385" y="465" width="680" height="82" rx="15" fill="#ffffff" stroke="#17242a" stroke-width="3"/>
    <text x="415" y="496" font-size="21" font-weight="700">Decision rule</text>
    <text x="415" y="526" font-size="20">Repeat when the test behaves as intended. Adjust one variable when it does not. Move when the lane or position cannot produce a safe, interpretable test.</text>
  </g>

  <text x="60" y="635" font-family="Arial, sans-serif" font-size="20" fill="#35474f">The diagram organizes a test. It does not prove fish presence, feeding behavior, or local safety.</text>
</svg>