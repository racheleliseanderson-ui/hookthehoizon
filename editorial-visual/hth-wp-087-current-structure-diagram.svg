<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Moving-water current structure</title>
  <desc id="desc">An explanatory diagram showing fast reference current, a seam, an upstream cushion, a downstream pocket, and a striped hazard zone around an obstruction. It does not represent a real location or imply fish presence.</desc>
  <defs>
    <pattern id="hazard" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="18" height="18" fill="#f7f4ed"/>
      <rect width="7" height="18" fill="#2d2d2d"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#143d4a"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#f7f4ed"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#17242a">Read the fast water, then inspect what happens beside it</text>
  <text x="60" y="110" font-family="Arial, sans-serif" font-size="21" fill="#35474f">Explanatory field diagram — not a real waterway and not a fish-location promise</text>

  <rect x="65" y="155" width="1070" height="430" rx="28" fill="#dcecf0" stroke="#17242a" stroke-width="4"/>
  <path d="M90 295 C300 225 500 360 720 275 C875 215 990 235 1110 205" fill="none" stroke="#143d4a" stroke-width="55" opacity="0.92" marker-end="url(#arrow)"/>
  <path d="M100 430 C315 380 505 470 710 405 C860 355 990 365 1100 330" fill="none" stroke="#5c8792" stroke-width="24" stroke-dasharray="22 16" marker-end="url(#arrow)"/>

  <ellipse cx="600" cy="330" rx="86" ry="58" fill="#5b4636" stroke="#17242a" stroke-width="4"/>
  <text x="600" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">OBSTRUCTION</text>

  <path d="M520 322 C485 295 480 255 520 228 C550 207 575 215 590 238 C560 252 540 280 520 322Z" fill="#ffffff" stroke="#17242a" stroke-width="3"/>
  <text x="420" y="215" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#17242a">Upstream cushion</text>
  <line x1="515" y1="230" x2="500" y2="220" stroke="#17242a" stroke-width="3"/>

  <path d="M675 330 C745 292 815 310 850 355 C805 405 735 420 675 375Z" fill="#b9d3d9" stroke="#17242a" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="825" y="455" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#17242a">Downstream pocket</text>
  <line x1="785" y1="414" x2="805" y2="438" stroke="#17242a" stroke-width="3"/>

  <path d="M330 250 C440 270 500 315 555 385 C650 505 770 475 925 405" fill="none" stroke="#ffffff" stroke-width="9" stroke-dasharray="18 13"/>
  <text x="330" y="500" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#17242a">Seam / speed boundary</text>
  <line x1="505" y1="465" x2="545" y2="420" stroke="#17242a" stroke-width="3"/>

  <path d="M540 382 C595 410 675 415 730 378 L775 430 C690 500 565 487 495 425Z" fill="url(#hazard)" stroke="#17242a" stroke-width="4"/>
  <text x="626" y="532" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#17242a">Striped area: turbulence / entrapment hazard</text>

  <g font-family="Arial, sans-serif" fill="#17242a">
    <text x="165" y="205" font-size="22" font-weight="700">Fast reference current</text>
    <text x="175" y="360" font-size="20">Use it as the baseline, not an automatic target.</text>
    <text x="175" y="395" font-size="20">Confirm the slower edge with several visible clues.</text>
  </g>

  <text x="60" y="635" font-family="Arial, sans-serif" font-size="20" fill="#35474f">Safety read and habitat read stay in the same frame. Current breaks can create useful structure and dangerous footing.</text>
</svg>